info:
  name: Obtener Reporte Mensual Doctor
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/doctores/administrador/2/reporte?mes=12&anio=2026"
  params:
    - name: mes
      value: "12"
      type: query
    - name: anio
      value: "2026"
      type: query
  auth:
    type: bearer
    token: "{{administradorToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
