info:
  name: Vincular Seguro Cliente
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/seguros/cliente/4"
  body:
    type: json
    data: |-
      { 
        "idSeguro": 3, 
        "nss": "123456789", 
        "numeroAfiliado": "123456789", 
