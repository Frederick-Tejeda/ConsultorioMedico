info:
  name: Autenticar Caja
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/usuarios/cajero/auth"
  body:
    type: json
    data: |-
      { 
        "correo": "caja@caja.caja", 
        "password": "caja"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        if(res.getStatus() === 200) {
          bru.setEnvVar("cajaToken", res.getBody().token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
