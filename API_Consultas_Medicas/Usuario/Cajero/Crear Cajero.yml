info:
  name: Crear Cajero
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/usuarios/cajero"
  body:
    type: json
    data: |-
      {
        "correo": "caja@caja.caja", 
        "password": "caja",
        "nombre": "NombreCajero"
      }
  auth:
    type: bearer
    token: "{{administradorToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
